- hosts: 192.168.1.86
  become: false
  vars:
    vm_id: 5

  tasks:

    - name: Verificar estado actual de la VM
      command: onevm show {{ vm_id }}
      register: vm_info

    - name: Crear snapshot antes de remediar
      command: onevm snapshot-create {{ vm_id }} "pre-remediation"
      register: snapshot_result

    - name: Esperar a que la VM vuelva a estado RUNNING
      command: onevm show {{ vm_id }}
      register: vm_state
      retries: 12
      delay: 5
      until: "'RUNNING' in vm_state.stdout"

    - name: Reiniciar VM comprometida
      command: onevm reboot {{ vm_id }}
      register: reboot_result

    - name: Registrar evento de remediación
      lineinfile:
        path: /home/automation/selfhealing.log
        line: "VM {{ vm_id }} remediada automáticamente"
        create: yes
